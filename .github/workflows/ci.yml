name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
          
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.1 --activate
        
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i --frozen-lockfile
          
      - name: Format check (Biome)
        run: pnpm format:check

  test:
    runs-on: ubuntu-latest
    needs: [format]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        eslint-version: ['9.29.0', '10']
    name: test (eslint@${{ matrix.eslint-version }})
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.15.1 --activate

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22.12.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Override ESLint version
        if: matrix.eslint-version != '10'
        run: pnpm add -D eslint@${{ matrix.eslint-version }} --no-lockfile

      - name: Regenerate baseline data (features + descriptors)
        run: pnpm gen:data

      - name: Verify descriptor ↔ compat key integrity
        run: pnpm check:descriptor-compat

      - name: Verify generated data is committed
        run: pnpm check:generated-data

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
